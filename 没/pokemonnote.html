<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>パーティ登録</title>
<style>
body {
  font-family: sans-serif;
  background: #1e1e1e;
  color: white;
  padding: 20px;
}
input[type="text"] {
  width: 7em;
}
input[type="number"] {
  width: 6ch;
}
.container {
  display: flex;
  gap: 20px;
}
.form, .list {
  background: #2c2c2c;
  padding: 15px;
  border-radius: 10px;
  width: 50%;
}
button {
  margin: 5px 3px;
}
.pokemon {
  border-bottom: 1px solid #555;
  padding: 5px 0;
}
table {
  border-collapse: collapse;
  margin-top: 10px;
}

th, td {
  padding: 5px 10px;
  text-align: center;
}

th {
  background: #444;
}

td {
  background: #2c2c2c;
}
#suggestions {
  background: #333;
  border-radius: 5px;
  max-height: 150px;
  overflow-y: auto;
  margin-top: 5px;
}

.suggest-item {
  padding: 5px;
  cursor: pointer;
}

.suggest-item:hover {
  background: #555;
}
[id^="moveSuggestions"] {
  background: #333;
  border-radius: 5px;
  max-height: 150px;
  overflow-y: auto;
  margin-top: 5px;
}
</style>
</head>
<body>

<h1>自分のパーティ登録</h1>

<div class="container">

  <!-- 入力 -->
  <div class="form">
    <h2>ポケモン入力</h2>

    名前：<input oninput="updateStats(); updateSuggestions()" type="text" id="name">
    <div id="suggestions"></div><br>

    努力値：
    H<input oninput="updateStats()" type="number" id="h" value="0">
    A<input oninput="updateStats()" type="number" id="a" value="0">
    B<input oninput="updateStats()" type="number" id="b" value="0">
    C<input oninput="updateStats()" type="number" id="c" value="0">
    D<input oninput="updateStats()" type="number" id="d" value="0">
    S<input oninput="updateStats()" type="number" id="s" value="0"><br>

   <h3>種族値</h3>
<table border="1">
  <tr>
    <th></th><th>HP</th><th>A</th><th>B</th><th>C</th><th>D</th><th>S</th>
  </tr>
  <tr>
    <td>通常</td>
    <td id="bh1">-</td>
    <td id="ba1">-</td>
    <td id="bb1">-</td>
    <td id="bc1">-</td>
    <td id="bd1">-</td>
    <td id="bs1">-</td>
  </tr>
  <tr>
    <td>メガ</td>
    <td id="bh2">-</td>
    <td id="ba2">-</td>
    <td id="bb2">-</td>
    <td id="bc2">-</td>
    <td id="bd2">-</td>
    <td id="bs2">-</td>
  </tr>
</table>

<h3>実数値</h3>
<table border="1">
  <tr>
    <th></th><th>HP</th><th>A</th><th>B</th><th>C</th><th>D</th><th>S</th>
  </tr>
  <tr>
    <td>通常</td>
    <td id="rh1">-</td>
    <td id="ra1">-</td>
    <td id="rb1">-</td>
    <td id="rc1">-</td>
    <td id="rd1">-</td>
    <td id="rs1">-</td>
  </tr>
  <tr>
    <td>メガ</td>
    <td id="rh2">-</td>
    <td id="ra2">-</td>
    <td id="rb2">-</td>
    <td id="rc2">-</td>
    <td id="rd2">-</td>
    <td id="rs2">-</td>
  </tr>
</table>
<br><br>
    選出：<input type="checkbox" id="selected">
    <button onclick="addOrUpdate()">追加 / 更新</button>
    <button onclick="saveParty()">保存</button>
<h3>技入力</h3>

技：<input type="text" id="move" oninput="updateMove(); updateMoveSuggestionsSingle()">

<div id="moveSuggestions"></div>

<h3>技</h3>
<p>
威力：<span id="power">-</span><br>
PP：<span id="pp">-</span><br>
効果：<span id="effect">-</span>
</p>
<div id="moves">
  <div>1: <input type="text" id="move1" oninput="updateMovePP(1); updateMoveSuggestions(1)"> PP:<span id="pp1">-</span> <button onclick="useMove(1)">使用</button><div id="moveSuggestions1"></div></div>
  <div>2: <input type="text" id="move2" oninput="updateMovePP(2); updateMoveSuggestions(2)"> PP:<span id="pp2">-</span> <button onclick="useMove(2)">使用</button><div id="moveSuggestions2"></div></div>
  <div>3: <input type="text" id="move3" oninput="updateMovePP(3); updateMoveSuggestions(3)"> PP:<span id="pp3">-</span> <button onclick="useMove(3)">使用</button><div id="moveSuggestions3"></div></div>
  <div>4: <input type="text" id="move4" oninput="updateMovePP(4); updateMoveSuggestions(4)"> PP:<span id="pp4">-</span> <button onclick="useMove(4)">使用</button><div id="moveSuggestions4"></div></div>
</div>
  </div>

  <!-- 一覧 -->
  <div class="list">
    <h2>パーティ一覧</h2>
    <div id="partyList"></div>
  </div>

</div>

<script>
let party = [];
let editIndex = null;
const baseStats = {
  "ガブリアス": {h:108, a:130, b:95, c:80, d:85, s:102},

  "メガガブリアス": {h:108, a:170, b:115, c:120, d:95, s:92},

  "ギルガルド(シールド)": {h:60, a:50, b:140, c:50, d:140, s:60},

  "ギルガルド(ブレード)": {h:60, a:140, b:50, c:140, d:50, s:60},
  "フシギバナ":{h:80,a:82,b:83,c:100,d:100,s:80},
  "メガフシギバナ":{h:80,a:100,b:123,c:122,d:120,s:80},
  "リザードン":{h:78,a:84,b:78,c:109,d:85,s:100},
  "メガリザードンX":{h:78,a:130,b:111,c:130,d:85,s:100},
  //"":{h:,a:,b:,c:,d:,s:},
};

// 追加 or 更新
function addOrUpdate() {
  const pokemon = {
    name: document.getElementById("name").value,
    ev: {
      h: Number(document.getElementById("h").value),
      a: Number(document.getElementById("a").value),
      b: Number(document.getElementById("b").value),
      c: Number(document.getElementById("c").value),
      d: Number(document.getElementById("d").value),
      s: Number(document.getElementById("s").value),
    },
    selected: document.getElementById("selected").checked
  };

  if (editIndex === null) {
    if (party.length >= 6) {
      alert("6体まで！");
      return;
    }
    party.push(pokemon);
  } else {
    party[editIndex] = pokemon;
    editIndex = null;
  }

  clearForm();
  render();
}

// 削除
function deletePokemon(index) {
  party.splice(index, 1);
  render();
}

function toHiragana(str) {
  return str.replace(/[\u30A1-\u30F6]/g, function(match) {
    return String.fromCharCode(match.charCodeAt(0) - 0x60);
  });
}

function updateSuggestions() {
  const input = document.getElementById("name").value;
  const box = document.getElementById("suggestions");

  box.innerHTML = "";

  if (!input) return;

  const hiraInput = toHiragana(input);

  const keys = Object.keys(baseStats);

  const results = keys.filter(name => {
    const hiraName = toHiragana(name);
    return hiraName.includes(hiraInput);
  });

  // より一致してる順に並べる
  results.sort((a, b) => {
    return toHiragana(a).indexOf(hiraInput) - toHiragana(b).indexOf(hiraInput);
  });

  results.slice(0, 10).forEach(name => {
    const div = document.createElement("div");
    div.textContent = name;
    div.className = "suggest-item";

    div.onclick = () => {
      document.getElementById("name").value = name;
      box.innerHTML = "";
      updateStats();
    };

    box.appendChild(div);
  });
}

const moves = {
  "じしん": {
    power: 100,
    pp: 10,
    effect: "全体攻撃"
  },
  "りゅうのまい": {
    power: "-",
    pp: 20,
    effect: "A↑ S↑"
  },
  "シャドーボール": {
    power: 80,
    pp: 15,
    effect: "D↓10%"
  },
  "キングシールド": {
    power: "-",
    pp: 10,
    effect: "防御＆接触A↓"
  }
};
let currentPP = {
  1: 0,
  2: 0,
  3: 0,
  4: 0
};
function updateMovePP(num) {
  const name = document.getElementById("move" + num).value;
  const data = moves[name];

  if (data) {
    currentPP[num] = data.pp;
    document.getElementById("pp" + num).textContent = data.pp;
  }
}
function useMove(num) {
  if (currentPP[num] > 0) {
    currentPP[num]--;
    document.getElementById("pp" + num).textContent = currentPP[num];
  }
}
let wPressed = false;

document.addEventListener("keydown", function(e) {

  if (e.key === "w") {
    wPressed = true;
  }

  if (wPressed) {
    if (e.key === "1") useMove(1);
    if (e.key === "2") useMove(2);
    if (e.key === "3") useMove(3);
    if (e.key === "4") useMove(4);
  }
});

document.addEventListener("keyup", function(e) {
  if (e.key === "w") {
    wPressed = false;
  }
});
function updateMove() {
  const name = document.getElementById("move").value;
  const data = moves[name];

  if (data) {
    document.getElementById("power").textContent = data.power;
    document.getElementById("pp").textContent = data.pp;
    document.getElementById("effect").textContent = data.effect;
  } else {
    document.getElementById("power").textContent = "-";
    document.getElementById("pp").textContent = "-";
    document.getElementById("effect").textContent = "-";
  }
}
function updateMoveSuggestionsSingle() {
  const input = document.getElementById("move").value;
  const box = document.getElementById("moveSuggestions");

  box.innerHTML = "";
  if (!input) return;

  const hiraInput = toHiragana(input);

  Object.keys(moves)
    .filter(name => toHiragana(name).includes(hiraInput))
    .slice(0, 10)
    .forEach(name => {
      const div = document.createElement("div");
      div.textContent = name;
      div.className = "suggest-item";

      div.onclick = () => {
        document.getElementById("move").value = name;
        box.innerHTML = "";
        updateMove();
      };

      box.appendChild(div);
    });
}
function updateMoveSuggestions(num) {
  const input = document.getElementById("move"+num).value;
  const box = document.getElementById("moveSuggestions"+num);

  box.innerHTML = "";

  if (!input) return;

  const hiraInput = toHiragana(input);

  const keys = Object.keys(moves);

  const results = keys.filter(name => {
    return toHiragana(name).includes(hiraInput);
  });

    results.sort((a, b) => {
    return toHiragana(a).indexOf(hiraInput) - toHiragana(b).indexOf(hiraInput);
  });

  results.slice(0, 10).forEach(name => {
    const div = document.createElement("div");
    div.textContent = name;
    div.className = "suggest-item";

    div.onclick = () => {
      document.getElementById("move"+num).value = name;
      box.innerHTML = "";
      updateMovePP(num);
    };

    box.appendChild(div);
  });
}

// 編集
function editPokemon(index) {
  const p = party[index];

  document.getElementById("name").value = p.name;
  document.getElementById("h").value = p.ev.h;
  document.getElementById("a").value = p.ev.a;
  document.getElementById("b").value = p.ev.b;
  document.getElementById("c").value = p.ev.c;
  document.getElementById("d").value = p.ev.d;
  document.getElementById("s").value = p.ev.s;
  document.getElementById("selected").checked = p.selected;

  editIndex = index;
}

// 表示
function render() {
  const list = document.getElementById("partyList");
  list.innerHTML = "";

  party.forEach((p, i) => {

    let normalName = p.name;
    let megaName = null;

    if (p.name.startsWith("メガ")) {
      normalName = p.name.replace("メガ", "");
      megaName = p.name;
    }

    const normal = baseStats[normalName];
    const mega = baseStats[megaName];

    // 実数値計算関数
    function calc(stat, ev, isHP=false) {
      return stat + ev + (isHP ? 75 : 20);
    }

    let html = `<div class="pokemon">`;
    html += `${i + 1}. ${p.name}<br>`;

    // 通常
    if (normal) {
      html += `通常：
      [H${calc(normal.h, p.ev.h, true)}
       A${calc(normal.a, p.ev.a)}
       B${calc(normal.b, p.ev.b)}
       C${calc(normal.c, p.ev.c)}
       D${calc(normal.d, p.ev.d)}
       S${calc(normal.s, p.ev.s)}]<br>`;
    }

    // メガ
    if (mega) {
      html += `メガ：
      [H${calc(mega.h, p.ev.h, true)}
       A${calc(mega.a, p.ev.a)}
       B${calc(mega.b, p.ev.b)}
       C${calc(mega.c, p.ev.c)}
       D${calc(mega.d, p.ev.d)}
       S${calc(mega.s, p.ev.s)}]<br>`;
    }

    html += `努力値：
    [H${p.ev.h} A${p.ev.a} B${p.ev.b} C${p.ev.c} D${p.ev.d} S${p.ev.s}]
    ${p.selected ? "★選出" : ""}<br>`;

    html += `
      <button onclick="editPokemon(${i})">編集</button>
      <button onclick="deletePokemon(${i})">削除</button>
    `;

    html += `</div>`;

    list.innerHTML += html;
  });
}

// 保存
function saveParty() {
  localStorage.setItem("myParty", JSON.stringify(party));
  alert("保存した！");
}

// フォーム初期化
function clearForm() {
  document.getElementById("name").value = "";
  document.getElementById("h").value = 0;
  document.getElementById("a").value = 0;
  document.getElementById("b").value = 0;
  document.getElementById("c").value = 0;
  document.getElementById("d").value = 0;
  document.getElementById("s").value = 0;
  document.getElementById("selected").checked = false;
}

// 読み込み
window.onload = function() {
  const data = localStorage.getItem("myParty");
  if (data) {
    party = JSON.parse(data);
    render();
  }
};


function updateStats() {
  const input = document.getElementById("name").value;

  let normalName = input;
  let megaName = null;

  // メガ判定
  if (input.startsWith("メガ")) {
    normalName = input.replace("メガ", "");
    megaName = input;
  }

  const normal = baseStats[normalName];
  const mega = baseStats[megaName];

  // 努力値
  const h = Number(document.getElementById("h").value);
  const a = Number(document.getElementById("a").value);
  const b = Number(document.getElementById("b").value);
  const c = Number(document.getElementById("c").value);
  const d = Number(document.getElementById("d").value);
  const s = Number(document.getElementById("s").value);
  // メガがない場合リセット
  if (!mega) {
  ["bh2","ba2","bb2","bc2","bd2","bs2",
   "rh2","ra2","rb2","rc2","rd2","rs2"]
   .forEach(id => document.getElementById(id).textContent = "-");
  }
  // 通常表示
  if (normal) {
    document.getElementById("bh1").textContent = normal.h;
    document.getElementById("ba1").textContent = normal.a;
    document.getElementById("bb1").textContent = normal.b;
    document.getElementById("bc1").textContent = normal.c;
    document.getElementById("bd1").textContent = normal.d;
    document.getElementById("bs1").textContent = normal.s;

    document.getElementById("rh1").textContent = normal.h + h + 75;
    document.getElementById("ra1").textContent = normal.a + a + 20;
    document.getElementById("rb1").textContent = normal.b + b + 20;
    document.getElementById("rc1").textContent = normal.c + c + 20;
    document.getElementById("rd1").textContent = normal.d + d + 20;
    document.getElementById("rs1").textContent = normal.s + s + 20;
  }

  // メガ表示
  if (mega) {
    document.getElementById("bh2").textContent = mega.h;
    document.getElementById("ba2").textContent = mega.a;
    document.getElementById("bb2").textContent = mega.b;
    document.getElementById("bc2").textContent = mega.c;
    document.getElementById("bd2").textContent = mega.d;
    document.getElementById("bs2").textContent = mega.s;

    document.getElementById("rh2").textContent = mega.h + h + 75;
    document.getElementById("ra2").textContent = mega.a + a + 20;
    document.getElementById("rb2").textContent = mega.b + b + 20;
    document.getElementById("rc2").textContent = mega.c + c + 20;
    document.getElementById("rd2").textContent = mega.d + d + 20;
    document.getElementById("rs2").textContent = mega.s + s + 20;
  }
}
</script>

</body>
</html>
